name: Force TestFlight upload (Xcode 16.4 altool)

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        type: string
        required: true
        description: Direct URL to the .ipa artifact from EAS Build

jobs:
  upload:
    name: Upload IPA with Xcode 16.4
    environment: production
    image: macos-sequoia-15.6-xcode-16.4
    runs_on: macos-medium
    steps:
      - name: Download IPA
        run: |
          set -euo pipefail
          curl -L --fail -o ./NepTranslate.ipa "${{ inputs.ipa_url }}"
          ls -lh ./NepTranslate.ipa

      - name: Upload to App Store Connect
        run: |
          set -euo pipefail

          # File-type EAS env vars resolve to a filesystem path.
          KEY_PATH="${ASC_KEY_P8}"
          if [ ! -f "$KEY_PATH" ]; then
            echo "ASC_KEY_P8 file not found at: $KEY_PATH"
            exit 1
          fi

          python3 - <<'PY'
          import json, os, pathlib
          key_path = os.environ["ASC_KEY_P8"]
          key_body = pathlib.Path(key_path).read_text(encoding="utf-8")
          payload = {
              "key_id": os.environ["ASC_KEY_ID"],
              "issuer_id": os.environ["ASC_ISSUER_ID"],
              "key": key_body,
          }
          pathlib.Path("asc_api_key.json").write_text(json.dumps(payload), encoding="utf-8")
          print("Wrote asc_api_key.json")
          PY

          export DELIVER_ALTOOL_ADDITIONAL_UPLOAD_PARAMETERS="--apple-id ${ASC_APP_ID} --use-old-altool --verbose"

          # Force explicit apple id + old altool path around the Xcode 26 silent-success bug.
          fastlane pilot upload \
            --ipa "./NepTranslate.ipa" \
            --api_key_path "./asc_api_key.json" \
            --apple_id "${ASC_APP_ID}" \
            --app_identifier "com.neptranslate.app" \
            --skip_waiting_for_build_processing true \
            --verbose
